# Apache Virtual Host Configuration for reg.localhost
# Add this to your Apache httpd-vhosts.conf file

<VirtualHost *:80>
    ServerName reg.localhost
    DocumentRoot "c:/Users/poorl/OneDrive/文档/GitHub/PHP-Assignment-5/php-mvc-main/public"
    
    # Set the base directory for rewrites
    <Directory "c:/Users/poorl/OneDrive/文档/GitHub/PHP-Assignment-5/php-mvc-main/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # URL rewriting for MVC
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            
            # Redirect requests to index.php if not files/directories
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php [QSA,L]
        </IfModule>
    </Directory>
    
    # Error and access logs
    ErrorLog "logs/reg.localhost-error.log"
    CustomLog "logs/reg.localhost-access.log" common
    
    # PHP settings
    php_flag display_errors On
    php_value error_reporting E_ALL
    
    # Set default index file
    DirectoryIndex index.php
    
    # URL rewriting for MVC
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        
        # Redirect requests to public folder
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php [QSA,L]
    </IfModule>
</VirtualHost>

